name: Quality Checks

on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Quality Checks
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        sp_naive: ["", "sp-naive"]
        non_zero_vma: ["", "non-zero-vma"]
        arm_el2: ["", "arm-el2"]
        preempt: ["", "preempt"]
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-none
          - riscv64gc-unknown-none-elf
          - aarch64-unknown-none-softfloat
          - loongarch64-unknown-none-softfloat
          - armv7a-none-eabi

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, clippy, rustfmt
          targets: ${{ matrix.target }}

      - name: Check rust version
        run: rustc --version --verbose

      - name: Install cargo-hack
        run: cargo install cargo-hack

      - name: Check code format
        run: cargo fmt --all -- --check

      - name: Build all feature power sets
        run: cargo hack build --feature-powerset --no-dev-deps --workspace --target ${{ matrix.target }}

      - name: Clippy all feature power sets
        run: cargo hack clippy --feature-powerset --no-dev-deps --workspace --target ${{ matrix.target }}
